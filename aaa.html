<!DOCTYPE html>
<html>
<head>
    <title>iOS App Chain PoC</title>
</head>
<body>
    <h1>Testing iOS App Redirection Chain...</h1>
    <p id="status">Starting tests...</p>

    <script>
        const status = document.getElementById('status');

        function openApp(scheme, name, delay) {
            setTimeout(() => {
                status.innerText = "Attempting to open: " + name;
                window.location = scheme;
            }, delay);
        }

        window.onload = function() {
            // ১. প্রথমে অ্যাপল ম্যাপস ওপেন করবে
            openApp("maps://", "Apple Maps", 1000);

            // ৩. ৫ সেকেন্ড পর গুগল জিমেইল অ্যাপ ওপেন করার চেষ্টা করবে
            // জিমেইল অ্যাপের জন্য iOS স্কিম হলো 'googlegmail://'
            openApp("googlegmail://co?to=test@example.com", "Google Gmail", 5000);
            
            // ৪. অতিরিক্ত: টেলিগ্রাম বা হোয়াটসঅ্যাপের জন্য নিচের গুলো ব্যবহার করতে পারেন
            openApp("tg://resolve?domain=test", "Telegram", 7000);
        };
    </script>

    <p style="margin-top: 50px; color: red;">
        <b>পর্যবেক্ষণ করুন:</b> ফায়ারফক্স কি জিমেইল বা মেইল খোলার সময় "Open in another app?" জাতীয় কোনো পারমিশন চাচ্ছে? নাকি সরাসরি অ্যাপে নিয়ে যাচ্ছে?
    </p>
</body>
</html>
