<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Account Login</title>
    <style>
        :root {
            --bg-color: #1e1e1e; 
            --content-bg: #2b2b2b;
            --url-bg: #2d2d2d; 
            --text-color: #f1f3f4;
            --icon-color: #9aa0a6; 
            --border-color: #3c4043;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; background-color: var(--content-bg);
        }

        #browser-header {
            position: fixed; top: 0; left: 0; width: 100%;
            height: 40px; background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            display: none; align-items: center; justify-content: space-between;
            padding: 0 10px; box-sizing: border-box; z-index: 10000;
        }

        .left-controls { display: flex; align-items: center; gap: 8px; }

        .traffic-lights { display: flex; gap: 6px; margin-right: 12px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; opacity: 0.8; }
        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        .icon-sidebar {
            width: 16px; height: 16px; margin-right: 12px;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="%239aa0a6"><path d="M1 2v12h14V2H1zm1 1h12v1H2V3zm12 10H2V5h12v8zm-4-7H3v1h7V6zM3 8h10v1H3V8zm0 2h10v1H3v-1zm0 2h10v1H3v-1z"/></svg>');
            background-size: contain; cursor: pointer;
        }

        .tab-count {
            border: 1.5px solid var(--border-color); border-radius: 6px;
            padding: 1px 7px; font-size: 11px; font-weight: 500; color: var(--text-color);
            background-color: #2b2b2b; margin-right: 12px;
        }

        .nav-arrows { display: flex; gap: 8px; color: var(--icon-color); font-size: 16px; cursor: not-allowed; }

        /* --- THE UPDATED URL BAR WITH USB/SIDEBAR LOGO --- */
        .url-bar-container {
            flex-grow: 1; max-width: 580px; height: 26px; 
            background: var(--url-bg); border-radius: 13px; 
            display: flex; align-items: center; padding: 0 10px;
            margin: 0 10px; color: var(--text-color); font-size: 13px;
            border: 1px solid var(--border-color);
        }

        /* Safari USB/Sidebar Logo Inside URL Bar */
        .url-usb-logo {
            width: 15px; height: 15px; margin-right: 10px;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%239aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>');
            background-size: contain; opacity: 0.9;
        }

        .url-text { flex-grow: 1; text-align: center; font-weight: 500; letter-spacing: -0.2px; padding-right: 20px; }

        .right-controls { display: flex; align-items: center; gap: 12px; color: var(--icon-color); }
        
        .icon-share {
            width: 14px; height: 14px;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="%23f1f3f4"><path d="M12.7 8.3L11.3 9.7l2.1 2.1c-.2-.1-.5-.1-.8-.1H3.6c-.3 0-.6 0-.8.1l2.1-2.1-1.4-1.4L1 11.2l3 3h8l3-3-2.3-2.9zM1 4.8l3 3 1.4-1.4L3.3 4.3h8.3l-2.1 2.1L10.9 7.8 13.9 4.8l-3-3-1.4 1.4 2.1 2.1H3.3l2.1-2.1L4 1.8 1 4.8z"/></svg>');
            background-size: contain;
        }

        .icon-extensions { font-size: 15px; letter-spacing: -0.5px; }

        #content-area {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; background: var(--content-bg);
            padding-top: 40px; 
        }

        .login-box {
            background: white; border-radius: 8px; width: 420px; padding: 48px 40px 36px;
            color: #202124; text-align: center; border: 1px solid var(--border-color);
        }

        .primary-btn {
            background: #1a73e8; color: white; border: none; border-radius: 4px;
            padding: 10px 24px; font-weight: 500; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="browser-header">
    <div class="left-controls">
        <div class="traffic-lights">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="icon-sidebar"></div>
        <div class="tab-count">3</div>
        <div class="nav-arrows">
            <span>〈</span>
            <span>〉</span>
        </div>
    </div>

    <div class="url-bar-container">
        <div class="url-usb-logo"></div> <div class="url-text">google.com</div>
        <span style="color:var(--icon-color); font-size:14px;">☆</span>
    </div>

    <div class="right-controls">
        <div class="icon-share"></div>
        <div class="icon" style="font-size:18px;">+</div>
        <div class="icon-extensions">⋮</div>
    </div>
</div>

<div id="content-area">
    <div id="setup-view">
        <h1 style="margin-bottom: 5px;">Google Services</h1>
        <p style="color: #9aa0a6; margin-top: 0;">A vital security update is available for your account access.</p>
        <button class="primary-btn" onclick="startSpoof()">Apply Update</button>
    </div>

    <div id="fake-login" style="display: none;">
        <div class="login-box">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="80" alt="Google">
            <h2 style="font-size: 24px; margin: 20px 0 8px;">Sign in</h2>
            <p style="margin-bottom: 24px;">Use your Google Account</p>
	    <p style="color: red; font-weight: bold; margin-top: -15px; margin-bottom: 20px;">Note: This is not google.com</p>
            <input type="email" placeholder="Email or phone" style="width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px;">
                <a href="#" style="color: #1a73e8; text-decoration: none; font-size: 14px; font-weight: 500;">Create account</a>
                <button class="primary-btn" style="margin: 0; padding: 10px 30px;">Next</button>
            </div>
        </div>
    </div>
</div>

<script>
    function startSpoof() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }

        setTimeout(() => {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('browser-header').style.display = 'flex';
            document.getElementById('fake-login').style.display = 'block';
        }, 100);
    }
</script>

</body>
</html>
